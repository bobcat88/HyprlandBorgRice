# =============================================================================
# hyprland.conf — Material You style
# Source: github.com/koeqaife/hyprland-material-you
# Hardware: AMD Ryzen 5 5600X · RX 6800 · 3440×1440 @ 165Hz ultrawide · FR AZERTY
# Requires: Hyprland ≥ 0.53.0
# =============================================================================
#
# DYNAMIC COLORS: install hypryou (see install.sh), then uncomment:
# source = ~/.cache/hypryou/colors/colors-hyprland.conf
#
# Without hypryou: border_size=0 so no color needed.
# =============================================================================

# source = ~/.cache/hypryou/colors/colors-hyprland.conf

# =============================================================================
# MONITORS
# Run `hyprctl monitors` to confirm connector name
# =============================================================================
monitor = DP-1, 3440x1440@165, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 3440x0, 1

# =============================================================================
# ENVIRONMENT VARIABLES — AMD RX 6800 + Material You extras
# =============================================================================
env = XDG_CURRENT_DESKTOP,          Hyprland
env = XDG_SESSION_TYPE,             wayland
env = XDG_SESSION_DESKTOP,          Hyprland
env = QT_QPA_PLATFORM,              wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR,  1
env = QT_QPA_PLATFORMTHEME,         qt5ct
env = GDK_BACKEND,                  wayland,x11
env = GDK_SCALE,                    1
env = MOZ_ENABLE_WAYLAND,           1
env = SDL_VIDEODRIVER,              wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = ELECTRON_ENABLE_WAYLAND,      1
env = NIXOS_OZONE_WL,               1
env = LIBVA_DRIVER_NAME,            radeonsi
env = VDPAU_DRIVER,                 radeonsi
env = XCURSOR_THEME,                ArcMidnight
env = XCURSOR_SIZE,                 24

# =============================================================================
# AUTOSTART
# =============================================================================
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = hyprsunset -t 4500
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = playerctld
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# BORG EXTRAS
exec-once = kando
exec-once = hyprwhspr
exec-once = ai-quota-waybar
# exec-once = hypryou-start

# =============================================================================
# GENERAL — no borders, material gaps
# =============================================================================
general {
    border_size             = 0
    gaps_in                 = 5
    gaps_out                = 12
    resize_on_border        = true
    extend_border_grab_area = 15
    allow_tearing           = false
    layout                  = dwindle
}

# =============================================================================
# DECORATION — rounded (squircle), blur xray, soft shadow
# =============================================================================
decoration {
    rounding          = 16
    rounding_power    = 2.0

    active_opacity    = 1.0
    inactive_opacity  = 1.0
    fullscreen_opacity = 1.0
    dim_inactive      = false

    blur {
        enabled          = true
        xray             = true
        size             = 4
        passes           = 3
        noise            = 0.05
        contrast         = 1.0
        vibrancy         = 0.3
        vibrancy_darkness = 0.5
        new_optimizations = true
    }

    shadow {
        enabled      = true
        range        = 10
        render_power = 5
        color        = rgba(3f000000)
        color_inactive = rgba(1f000000)
        offset       = 0 2
        scale        = 1.0
    }
}

# =============================================================================
# ANIMATIONS — Material Design 3 suite
#   md3_decel    windows open / workspace arrive
#   md3_accel    windows close
#   softAcDecel  workspace slide blend
#   menu_decel   layer fade in
#   menu_accel   layer fade out
#   workspaces   slidefade 35% — the MD3 signature
# =============================================================================
animations {
    enabled = true

    bezier = linear,        0,    0,    1,    1
    bezier = md3_standard,  0.2,  0,    0,    1
    bezier = md3_decel,     0.05, 0.7,  0.1,  1
    bezier = md3_accel,     0.3,  0,    0.8,  0.15
    bezier = overshot,      0.05, 0.9,  0.1,  1.1
    bezier = hyprnostretch, 0.05, 0.9,  0.1,  1.0
    bezier = menu_decel,    0.1,  1,    0,    1
    bezier = menu_accel,    0.38, 0.04, 1,    0.07
    bezier = easeOutCirc,   0,    0.55, 0.45, 1
    bezier = easeOutExpo,   0.16, 1,    0.3,  1
    bezier = softAcDecel,   0.26, 0.26, 0.15, 1
    bezier = md2,           0.4,  0,    0.2,  1

    animation = windows,          1, 4, md3_decel,  popin 60%
    animation = windowsIn,        1, 5, md3_decel,  popin 60%
    animation = windowsOut,       1, 4, md3_accel,  popin 60%
    animation = fade,             1, 3, md3_decel
    animation = layers,           1, 2, md3_decel,  slide
    animation = layersIn,         1, 3, md3_decel,  slide
    animation = layersOut,        1, 3, md3_accel,  slide
    animation = fadeLayersIn,     1, 3, menu_decel
    animation = fadeLayersOut,    1, 3, menu_accel
    animation = workspaces,       1, 4, softAcDecel, slidefade 35%
    animation = specialWorkspace, 1, 3, md3_decel,  slidevert
}

# =============================================================================
# INPUT — FR AZERTY, flat acceleration
# =============================================================================
input {
    kb_layout    = fr
    kb_variant   = ""
    kb_model     = ""
    kb_options   = ""
    kb_rules     = ""

    follow_mouse  = 1
    sensitivity   = 0
    accel_profile = flat
    repeat_rate   = 25
    repeat_delay  = 600

    touchpad {
        natural_scroll = false
    }
}

# =============================================================================
# GESTURES
# =============================================================================
gestures {
    workspace_swipe          = true
    workspace_swipe_fingers  = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert   = false
    workspace_swipe_cancel_ratio = 0.3
}

# =============================================================================
# MISC — all material-you flags
# =============================================================================
misc {
    font_family                      = JetBrains Mono
    force_default_wallpaper          = 0
    disable_hyprland_logo            = true
    disable_splash_rendering         = true
    animate_manual_resizes           = false
    animate_mouse_windowdragging     = false
    enable_swallow                   = false
    focus_on_activate                = true
    on_focus_under_fullscreen        = 2
    mouse_move_enables_dpms          = true
    key_press_enables_dpms           = true
    session_lock_xray                = true
    allow_session_lock_restore       = true
    lockdead_screen_delay            = 5000
    enable_anr_dialog                = true
    anr_missed_pings                 = 3
    initial_workspace_tracking       = false
    new_window_takes_over_fullscreen = 2
    vfr                              = true
}

# =============================================================================
# ECOSYSTEM
# =============================================================================
ecosystem {
    no_donation_nag = true
    no_update_news  = true
}

# =============================================================================
# LAYOUTS
# =============================================================================
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_resizing = true
}

master {
    new_status     = slave
    new_on_active  = true
    drop_at_cursor = true
    smart_resizing = true
    mfact          = 0.55
}

# =============================================================================
# BINDS — FR AZERTY
# =============================================================================
$mod = SUPER

# App launchers
bind = $mod,       Return,  exec, kitty
bind = $mod,       K,       exec, kitty
bind = $mod,       E,       exec, thunar
bind = $mod,       F,       exec, firefox
bind = $mod,       D,       exec, rofi -show drun -show-icons
bind = ALT,        Tab,     exec, rofi -show window -show-icons
bind = $mod,       C,       exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Window management
bind = $mod,        Q,     killactive
bind = ALT,         F4,    killactive
bind = $mod,        G,     fullscreen, 0
bind = $mod SHIFT,  F,     togglefloating
bind = $mod,        P,     pseudo
bind = $mod,        J,     togglesplit

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod CTRL, left,  movewindow, l
bind = $mod CTRL, right, movewindow, r
bind = $mod CTRL, up,    movewindow, u
bind = $mod CTRL, down,  movewindow, d

# Resize
binde = $mod SHIFT, left,  resizeactive, -50 0
binde = $mod SHIFT, right, resizeactive,  50 0
binde = $mod SHIFT, up,    resizeactive,  0 -50
binde = $mod SHIFT, down,  resizeactive,  0  50

# Workspaces — FR AZERTY
bind = $mod,       ampersand,  workspace, 1
bind = $mod,       eacute,     workspace, 2
bind = $mod,       quotedbl,   workspace, 3
bind = $mod,       apostrophe, workspace, 4
bind = $mod,       parenleft,  workspace, 5
bind = $mod,       minus,      workspace, 6
bind = $mod,       egrave,     workspace, 7
bind = $mod,       underscore, workspace, 8
bind = $mod,       ccedilla,   workspace, 9
bind = $mod,       agrave,     workspace, 10

bind = $mod SHIFT, ampersand,  movetoworkspace, 1
bind = $mod SHIFT, eacute,     movetoworkspace, 2
bind = $mod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft,  movetoworkspace, 5
bind = $mod SHIFT, minus,      movetoworkspace, 6
bind = $mod SHIFT, egrave,     movetoworkspace, 7
bind = $mod SHIFT, underscore, movetoworkspace, 8
bind = $mod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mod SHIFT, agrave,     movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Special workspace
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspacesilent,  special:magic

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Notifications
bind = $mod,       A, exec, swaync-client -t
bind = $mod SHIFT, N, exec, swaync-client -C

# Lock
bindel = $mod, L, exec, swaylock

# System
bind  = $mod SHIFT, M, exit
bind  = $mod SHIFT, R, exec, hyprctl reload

# Screenshot
bind = ,      Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod,  Print, exec, grim - | wl-copy

# Media
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@  5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@          5%-
bind   = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@   toggle
bind   = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl prev
bind   = , XF86MonBrightnessUp,   exec, brightnessctl -q s +10%
bind   = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-

# =============================================================================
# WINDOW RULES — match: syntax (Hyprland ≥ 0.53.0)
# =============================================================================
windowrule = match:class ^(Brave-browser)$,        tile on
windowrule = match:class ^(Chromium)$,             tile on
windowrule = match:class ^(pavucontrol)$,          float on
windowrule = match:class ^(blueman-manager)$,      float on
windowrule = match:class ^(blueberry.py)$,         float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(qalculate-gtk)$,        float on
windowrule = match:class ^(steam)$,                float on
windowrule = match:class ^(imv)$,                  float on
windowrule = match:class ^(mpv)$,                  float on
windowrule = match:class ^(mpv)$,                  center on
windowrule = match:title ^(Volume Control)(.*)$,   float on

# File dialogs auto-float
windowrule = match:title ^(Open File)(.*)$,        float on
windowrule = match:title ^(Select a File)(.*)$,    float on
windowrule = match:title ^(Choose wallpaper)(.*)$, float on
windowrule = match:title ^(Open Folder)(.*)$,      float on
windowrule = match:title ^(Save As)(.*)$,          float on
windowrule = match:title ^(Library)(.*)$,          float on
windowrule = match:title ^(File Upload)(.*)$,      float on

# Gaming — immediate (tearing = lower latency)
windowrule = match:class .*\.exe,              immediate on
windowrule = match:class ^(cs2)$,             immediate on
windowrule = match:class ^(steam_app_.*)$,    immediate on

# XWayland video bridge
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override
windowrule = match:class ^(xwaylandvideobridge)$, no_anim on
windowrule = match:class ^(xwaylandvideobridge)$, no_initial_focus on
windowrule = match:class ^(xwaylandvideobridge)$, max_size 1 1
windowrule = match:class ^(xwaylandvideobridge)$, no_blur on

# =============================================================================
# LAYER RULES
# =============================================================================
layerrule = match:namespace selection,  no_anim on
layerrule = match:namespace popup.*,    no_anim on
layerrule = match:namespace hyprpicker, no_anim on
layerrule = match:namespace noanim,     no_anim on
layerrule = match:namespace wallpapers, no_anim on
layerrule = blur,       waybar
layerrule = blur,       rofi
layerrule = blur,       swaync-control-center
layerrule = ignorezero, swaync-control-center
