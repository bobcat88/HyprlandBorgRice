# =============================================================================
# hypridle.conf — Material You style
# Deploy: ~/.config/hypr/hypridle.conf
# koeqaife defaults (from config.py): lock=300s, dpms=60s after lock
# Desktop = AC only (no battery listeners needed)
# =============================================================================

general {
    lock_cmd            = pidof swaylock || swaylock
    before_sleep_cmd    = loginctl lock-session
    after_sleep_cmd     = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# 5 min idle → lock screen
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 6 min idle → screen off (1 min after lock)
listener {
    timeout    = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Optional: uncomment for auto-suspend (koeqaife has no sleep on AC by default)
# listener {
#     timeout    = 1800
#     on-timeout = systemctl suspend
# }
