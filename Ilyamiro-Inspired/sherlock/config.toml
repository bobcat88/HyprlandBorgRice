# =============================================================================
# Sherlock config — ilyamiro style
# ~/.config/sherlock/config.toml
# Hardware: AMD RX 6800 · 3440×1440@165Hz · FR AZERTY
# =============================================================================

[default_apps]
terminal        = "kitty"
browser         = "firefox"
calendar_client = "thunderbird"

[units]
lengths      = "meters"
weights      = "kg"
volumes      = "l"
temperatures = "C"
currency     = "eur"

[debug]
try_suppress_errors   = false
try_suppress_warnings = false
app_paths             = []

[appearance]
# 900px wide on 3440px ultrawide — feels right, not too dominant
width         = 920
height        = 560
# cairo = fastest cold start; gl/ngl = smoother on AMD — try both
gsk_renderer  = "cairo"
icon_size     = 22
use_base_css  = true
opacity       = 1.0
search_icon   = true
num_shortcuts = 5

[behavior]
use_xdg_data_dir_icons = false
animate        = true
remember_query = false
n_clicks       = 2

[keybinds]
# Vim-style navigation inside sherlock (CTRL = safe, won't conflict AZERTY)
"ctrl-j"      = "item_down"
"ctrl-k"      = "item_up"
"ctrl-h"      = "item_left"
"ctrl-l"      = "item_right"
"ctrl-Return" = "exec_inplace"
"ctrl-i"      = "toggle_context"
"ctrl-Back"   = "clear_bar"
"Escape"      = "exit"

[files]
fallback = "~/.config/sherlock/fallback.json"
css      = "~/.config/sherlock/main.css"
alias    = "~/.config/sherlock/sherlock_alias.json"
ignore   = "~/.config/sherlock/sherlockignore"
actions  = "~/.config/sherlock/sherlock_actions.json"

[runtime]
multi        = false
display_raw  = false
center       = false
photo_mode   = false
# Daemonized = instant open (sherlock stays in memory)
daemonize    = true

[caching]
enable = true
cache  = "~/.cache/sherlock/desktop_cache.bin"

[expand]
enable = false
edge   = "top"
margin = 0

[backdrop]
enable  = false
opacity = 0.6
edge    = "top"

[status_bar]
enable = true

[search_bar_icon]
enable    = true
icon      = "system-search-symbolic"
icon_back = "sherlock-back"
size      = 22
