# =============================================================================
# hyprland.conf — ilyamiro style
# Source: github.com/ilyamiro/nixos-configuration
# Hardware: AMD Ryzen 5 5600X · RX 6800 · 3440×1440 @ 165Hz ultrawide · FR AZERTY
# =============================================================================

# =============================================================================
# MONITORS
# Run `hyprctl monitors` to confirm connector name
# =============================================================================
monitor = DP-1, 3440x1440@165, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 3440x0, 1

# =============================================================================
# ENVIRONMENT VARIABLES — AMD RX 6800, pure Wayland
# =============================================================================
env = XDG_SESSION_TYPE,             wayland
env = XDG_SESSION_DESKTOP,          Hyprland
env = XDG_CURRENT_DESKTOP,          Hyprland
env = QT_QPA_PLATFORM,              wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = GDK_BACKEND,                  wayland,x11
env = SDL_VIDEODRIVER,              wayland
env = CLUTTER_BACKEND,              wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = NIXOS_OZONE_WL,               1
env = LIBVA_DRIVER_NAME,            radeonsi
env = VDPAU_DRIVER,                 radeonsi
env = XCURSOR_THEME,                ArcMidnight
env = XCURSOR_SIZE,                 24

# =============================================================================
# AUTOSTART
# =============================================================================
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = playerctld
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# BORG EXTRAS
exec-once = kando
exec-once = hyprwhspr
exec-once = ai-quota-waybar
# exec-once = systemctl --user enable --now easyeffects

# =============================================================================
# GENERAL — ilyamiro: no borders, tight gaps, extend grab area
# =============================================================================
general {
    border_size             = 0
    gaps_in                 = 4
    gaps_out                = 4
    float_gaps              = 6
    resize_on_border        = true
    extend_border_grab_area = 30
    allow_tearing           = false
    layout                  = dwindle
}

# =============================================================================
# DECORATION — ilyamiro: flat, no blur, no shadow, rounding=4
# =============================================================================
decoration {
    rounding          = 4

    active_opacity    = 1.0
    inactive_opacity  = 1.0
    fullscreen_opacity = 1.0
    dim_inactive      = false

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

# =============================================================================
# ANIMATIONS — single bezier, windows popin, layers fade, workspaces slide
# =============================================================================
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,             1, 5, myBezier, popin 80%
    animation = windowsOut,          1, 5, myBezier, popin 80%
    animation = layers,              1, 5, myBezier, fade
    animation = layersIn,            1, 5, myBezier, fade
    animation = layersOut,           1, 5, myBezier, fade
    animation = fade,                1, 5, myBezier
    animation = workspaces,          1, 5, myBezier, slide
    animation = specialWorkspaceIn,  1, 5, myBezier, fade
    animation = specialWorkspaceOut, 1, 5, myBezier, fade
}

# =============================================================================
# INPUT — FR AZERTY, flat acceleration
# =============================================================================
input {
    kb_layout    = fr
    kb_variant   = ""
    kb_model     = ""
    kb_options   = ""
    kb_rules     = ""

    follow_mouse  = 1
    sensitivity   = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

# =============================================================================
# GESTURES
# =============================================================================
gestures {
    workspace_swipe          = true
    workspace_swipe_fingers  = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert   = false
    workspace_swipe_cancel_ratio = 0.3
}

# =============================================================================
# MISC
# =============================================================================
misc {
    font_family                      = JetBrains Mono
    force_default_wallpaper          = 0
    disable_hyprland_logo            = true
    disable_splash_rendering         = true
    animate_manual_resizes           = true
    animate_mouse_windowdragging     = true
    enable_swallow                   = true
    swallow_regex                    = ^(kitty|foot|Alacritty)$
    focus_on_activate                = true
    new_window_takes_over_fullscreen = 2
    vfr                              = true
}

# =============================================================================
# ECOSYSTEM
# =============================================================================
ecosystem {
    no_donation_nag = true
    no_update_news  = true
}

# =============================================================================
# LAYOUTS
# =============================================================================
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

master {
    new_status = slave
    mfact      = 0.55
}

# =============================================================================
# BINDS — FR AZERTY, SUPER+L = lock only
# =============================================================================
$mod = SUPER

# App launchers
bind = $mod,       Return,  exec, kitty
bind = $mod,       E,       exec, thunar
bind = $mod,       F,       exec, firefox
bind = $mod,       D,       exec, rofi -show drun -show-icons
bind = ALT,        Tab,     exec, rofi -show window -show-icons
bind = $mod,       C,       exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Window management
bind = $mod,        Q,     killactive
bind = ALT,         F4,    killactive
bind = $mod,        F,     fullscreen, 0
bind = $mod SHIFT,  F,     togglefloating
bind = $mod,        P,     pseudo
bind = $mod,        J,     togglesplit

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod CTRL, left,  movewindow, l
bind = $mod CTRL, right, movewindow, r
bind = $mod CTRL, up,    movewindow, u
bind = $mod CTRL, down,  movewindow, d

# Resize
binde = $mod SHIFT, left,  resizeactive, -50 0
binde = $mod SHIFT, right, resizeactive,  50 0
binde = $mod SHIFT, up,    resizeactive,  0 -50
binde = $mod SHIFT, down,  resizeactive,  0  50

# Workspaces — FR AZERTY
bind = $mod,       ampersand,  workspace, 1
bind = $mod,       eacute,     workspace, 2
bind = $mod,       quotedbl,   workspace, 3
bind = $mod,       apostrophe, workspace, 4
bind = $mod,       parenleft,  workspace, 5
bind = $mod,       minus,      workspace, 6
bind = $mod,       egrave,     workspace, 7
bind = $mod,       underscore, workspace, 8
bind = $mod,       ccedilla,   workspace, 9
bind = $mod,       agrave,     workspace, 10

bind = $mod SHIFT, ampersand,  movetoworkspace, 1
bind = $mod SHIFT, eacute,     movetoworkspace, 2
bind = $mod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft,  movetoworkspace, 5
bind = $mod SHIFT, minus,      movetoworkspace, 6
bind = $mod SHIFT, egrave,     movetoworkspace, 7
bind = $mod SHIFT, underscore, movetoworkspace, 8
bind = $mod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mod SHIFT, agrave,     movetoworkspace, 10

bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up,   workspace, e+1

# Special workspace
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspacesilent,  special:magic

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Notifications
bind = $mod,       A, exec, swaync-client -t
bind = $mod SHIFT, N, exec, swaync-client -C

# Screenshot
bind = ,      Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod,  Print, exec, grim - | wl-copy

# System
bind  = $mod SHIFT, M, exit
bind  = $mod SHIFT, R, exec, hyprctl reload
bindel = $mod, L, exec, swaylock

# Media
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@  5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@          5%-
bind   = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@   toggle
bind   = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl prev

# =============================================================================
# WINDOW RULES
# =============================================================================
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(file-roller)$
windowrulev2 = float,  class:^(imv)$
windowrulev2 = float,  class:^(mpv)$
windowrulev2 = center, class:^(mpv)$
windowrulev2 = float,  class:^(thunar)$, title:^(?!.*Thunar).*$
windowrulev2 = size 900 600,  class:^(pavucontrol)$
windowrulev2 = size 1200 800, class:^(blueman-manager)$

windowrulev2 = opacity 0.0 override 0.0 override, class:^(xwaylandvideobridge)$
windowrulev2 = noanim,         class:^(xwaylandvideobridge)$
windowrulev2 = nofocus,        class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus, class:^(xwaylandvideobridge)$

windowrulev2 = immediate, class:^(cs2)$
windowrulev2 = immediate, class:^(steam_app_.*)$

# =============================================================================
# LAYER RULES
# =============================================================================
layerrule = noanim, ^(volume_osd)$
layerrule = noanim, ^(brightness_osd)$
layerrule = blur,       waybar
layerrule = blur,       rofi
layerrule = blur,       swaync-control-center
layerrule = ignorezero, swaync-control-center
